<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2; url=https://script.google.com/a/macros/brown.edu/s/AKfycbxT-ODEhBJJw0ReDAE1Hq9Qg58ihHQ6lpPSiTEsiTRVxXZeYNwplHIUDpbAPlvUsHAu/exec">
  <title>DIPARK · Subject ID Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f5f0ed;font-family:'Source Sans 3',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    .bar{background:#4E3629;height:56px;display:flex;align-items:center;padding:0 2rem;gap:12px}
    .logo{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo svg{width:18px;height:18px}
    .bar-name{font-family:'Libre Baskerville',serif;color:#fff;font-size:.95rem}
    .bar-name span{opacity:.6;font-size:.8rem;margin-left:6px;font-family:'Source Sans 3',sans-serif}
    .body{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{background:#fff;border:1px solid #d0c8c3;border-radius:4px;max-width:400px;width:100%;overflow:hidden;box-shadow:0 2px 16px rgba(78,54,41,.08);text-align:center}
    .card-top{height:4px;background:#4E3629}
    .card-body{padding:2.5rem 2rem}
    .spinner{width:36px;height:36px;border:3px solid #e8ddd8;border-top-color:#4E3629;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-family:'Libre Baskerville',serif;font-size:1.15rem;font-weight:400;color:#4E3629;margin-bottom:.4rem}
    p{font-size:.85rem;color:#6b6b6b;line-height:1.6}
    .link{display:inline-block;margin-top:1.25rem;font-size:.82rem;color:#4E3629;font-weight:600;text-decoration:none;border-bottom:1px solid #d0c8c3;padding-bottom:1px}
    .link:hover{border-color:#4E3629}
    footer{padding:1rem;text-align:center;font-size:.72rem;color:#9b9089;border-top:1px solid #e8e2de}
  </style>
</head>
<body>
  <div class="bar">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" stroke="#4E3629" stroke-width="2.5"/>
        <path d="M10 16 Q16 9 22 16 Q16 23 10 16Z" fill="#4E3629"/>
      </svg>
    </div>
    <span class="bar-name">Alhusaini Lab <span>· Brown University</span></span>
  </div>

  <div class="body">
    <div class="card">
      <div class="card-top"></div>
      <div class="card-body">
        <div class="spinner"></div>
        <h1>Subject ID Portal</h1>
        <p>Redirecting to the MRI enrollment portal&hellip;<br>You will need your Brown Google account.</p>
        <a class="link" href="https://script.google.com/a/macros/brown.edu/s/AKfycbxT-ODEhBJJw0ReDAE1Hq9Qg58ihHQ6lpPSiTEsiTRVxXZeYNwplHIUDpbAPlvUsHAu/exec">Continue to portal</a>
      </div>
    </div>
  </div>

  <footer>Alhusaini Lab &nbsp;&middot;&nbsp; Brown University &nbsp;&middot;&nbsp; For internal lab use only</footer>
</body>
</html>
